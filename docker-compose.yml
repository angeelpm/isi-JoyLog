version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: joylog_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - joylog-net

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: joylog_api_gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - .:/usr/src/app
    depends_on:
      - mongodb
    networks:
      - joylog-net
    command: npm run dev --workspace=api-gateway

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: joylog_auth_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/joylog
      - JWT_SECRET=supersecret123
    volumes:
      - .:/usr/src/app
    depends_on:
      - mongodb
    networks:
      - joylog-net
    command: npm run dev --workspace=auth-service

  library-service:
    build:
      context: ./services/library-service
      dockerfile: Dockerfile
    container_name: joylog_library_service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/joylog
    volumes:
      - .:/usr/src/app
    depends_on:
      - mongodb
    networks:
      - joylog-net
    command: npm run dev --workspace=library-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: joylog_frontend
    ports:
      - "5173:5173" 
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - .:/usr/src/app
    depends_on:
      - api-gateway
    networks:
      - joylog-net
    command: npm run dev --workspace=joylog-frontend

volumes:
  mongodb_data:

networks:
  joylog-net:
    driver: bridge
