version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: joylog_mongo
    volumes:
      - mongodb_data:/data/db
    networks:
      - joylog-net

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: joylog_api_gateway
    ports:
      - "3000:3000"
    volumes:
      - ./services/api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - joylog-net
    depends_on:
      - auth-service
      - library-service
    command: npm run dev

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: joylog_auth_service
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/joylog-auth
      - JWT_SECRET=super_secret_joylog_development_key
    volumes:
      - ./services/auth-service:/usr/src/app
      - ./shared:/usr/src/shared
      - /usr/src/app/node_modules
    networks:
      - joylog-net
    depends_on:
      - mongodb
    command: npm run dev

  library-service:
    build:
      context: ./services/library-service
      dockerfile: Dockerfile
    container_name: joylog_library_service
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/joylog-library
    volumes:
      - ./services/library-service:/usr/src/app
      - ./shared:/usr/src/shared
      - /usr/src/app/node_modules
    networks:
      - joylog-net
    depends_on:
      - mongodb
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: joylog_frontend
    ports:
      - "5173:5173" 
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/usr/src/app
      - ./shared:/usr/src/shared
      - /usr/src/app/node_modules
    depends_on:
      - api-gateway
    networks:
      - joylog-net
    command: npm run dev

volumes:
  mongodb_data:

networks:
  joylog-net:
    driver: bridge
